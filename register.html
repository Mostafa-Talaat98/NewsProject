<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Premium News</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light auth-bg">
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm custom-navbar">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="index.html">NewsHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="target"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-medium fs-5">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="tourism.html">World Tourism</a></li>
                    <li class="nav-item"><a class="nav-link" href="matches.html">Sports</a></li>
                    <li class="nav-item"><a class="nav-link" href="science.html">Science and Health</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Economy</a></li>
                </ul>
                <!-- Auth Buttons -->
                <div class="d-flex ms-lg-4 mt-3 mt-lg-0 gap-2">
                    <a href="login.html" class="btn btn-outline-light px-4">Login</a>
                    <a href="register.html"
                        class="btn btn-warning px-4 text-dark fw-bold active nav-register-btn">Register</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Auth Container -->
    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5 mt-4 mt-md-0">
        <div class="auth-card card shadow-lg border-0 rounded-4 w-100" style="max-width: 500px;">
            <div class="card-body p-sm-5 p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary mb-2">Create an Account</h2>
                    <p class="text-muted">Join NewsHub for premium content</p>
                </div>

                <button
                    class="btn btn-outline-dark w-100 mb-4 d-flex align-items-center justify-content-center gap-2 google-btn py-2">
                    <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                        <path fill="#4285F4"
                            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                        <path fill="#FBBC05"
                            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                    </svg>
                    Sign up with Google
                </button>

                <div class="position-relative d-flex align-items-center justify-content-center my-4">
                    <hr class="w-100 text-muted">
                    <span class="position-absolute bg-white px-3 text-muted small">OR</span>
                </div>

                <form>
                    <div class="mb-3">
                        <label for="fullName" class="form-label fw-semibold">Full Name</label>
                        <input type="text" class="form-control form-control-lg bg-light" id="fullName"
                            placeholder="John Doe" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">Email address</label>
                        <input type="email" class="form-control form-control-lg bg-light" id="email"
                            placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control form-control-lg bg-light" id="password"
                            placeholder="********" required>
                    </div>
                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
                        <input type="password" class="form-control form-control-lg bg-light" id="confirmPassword"
                            placeholder="********" required>
                    </div>

                    <button type="submit"
                        class="btn btn-primary w-100 btn-lg fw-bold mb-3 shadow-sm auth-submit-btn">Create
                        Account</button>

                    <p class="text-muted small text-center mb-0">
                        By registering, you agree to our <a href="#" class="text-primary text-decoration-none">Terms of
                            Service</a> and <a href="#" class="text-primary text-decoration-none">Privacy Policy</a>.
                    </p>
                </form>

                <div class="text-center mt-4 pt-3 border-top">
                    <p class="text-muted small mb-0">Already have an account? <a href="login.html"
                            class="text-primary fw-bold text-decoration-none">Sign in here</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Auth Script -->
    <script type="module" src="auth.js"></script>
</body>

</html>
